name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm test

  lint-html:
    name: Validar HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar que index.html existe y es valido
        run: |
          test -f index.html || (echo "index.html no existe" && exit 1)
          grep -q "<!DOCTYPE html>" index.html || (echo "DOCTYPE faltante" && exit 1)
          grep -q "escapeHtml" index.html || (echo "funcion escapeHtml faltante" && exit 1)
          echo "HTML OK"

  deploy:
    name: GitHub Pages (solo main)
    needs: [test, lint-html]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4
      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
